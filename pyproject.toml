[project]
name = "haystack"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.2",
    "blinker==1.7.0",
    "coverage>=7.10.7",
    "django>=5.2.6",
    "django-environ>=0.12.0",
    "django-stubs[compatible-mypy]>=5.2.5",
    "psycopg2-binary>=2.9.10",
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "pytest-django>=4.11.1",
    "selenium-wire>=5.1.0",
    "setuptools>=80.9.0",
]

[dependency-groups]
dev = [
    "ruff>=0.13.2",
]

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    "settings.py",
]
line-length = 119
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D", # documentation
    "COM812", # missing trailing comma, redundant when using format
    "ANN002", # *args type checking
    "ANN003", # **kwargs type checking
    "ANN401", # typing.Any **kwargs
    "EM101", # raw string in exception
    "TRY003", # raise-vanilla-args
    "PLR2004", # magic values
    "FBT002", # boolean default fields
    "ANN001", # function parameter type annotations
    "UP040", # PEP695 TypeAlias
    "RUF012", # ClassVar
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.flake8-quotes]
inline-quotes = "single"

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = [
    "S101", # assert
]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "haystack.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]

[tool.coverage.run]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/settings/*",
    "*/manage.py",
    "*/wsgi.py",
    "*/asgi.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.mypy]
plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "haystack.settings"
